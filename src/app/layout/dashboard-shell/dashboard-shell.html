<div class="app-shell d-flex min-vh-100 border-5">
    <app-sidebar class="d-none d-lg-flex" [mobile]="false"></app-sidebar>

    <div
        class="app-mobile-sidebar-backdrop d-lg-none"
        [class.is-open]="sidebarOpen()"
        [attr.aria-hidden]="!sidebarOpen()"
        (click)="closeSidebar()"
    ></div>
    <app-sidebar
        class="app-mobile-sidebar d-lg-none"
        [class.is-open]="sidebarOpen()"
        [attr.aria-hidden]="!sidebarOpen()"
        [mobile]="true"
        (navigate)="closeSidebar()"
    ></app-sidebar>

    <div class="app-main flex-grow-1 d-flex flex-column min-vh-100">
        <app-topbar (menuClick)="toggleSidebar()"></app-topbar>
        <main class="app-content flex-grow-1">
            <div class="container-fluid px-3 px-lg-4 py-4">
                <router-outlet></router-outlet>
            </div>
        </main>

    </div>
</div>
