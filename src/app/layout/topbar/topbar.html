<header class="app-top-bar glass-medium">
  <div class="container-fluid app-top-bar__inner">
    <div class="app-top-bar__row">
      <div class="app-top-bar__left">
        <button type="button" class="btn btn-icon d-lg-none" (click)="onMenuClick()" title="Toggle sidebar">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <div class="top-bar-eyebrow">Workspace</div>
          <div class="top-bar-title">Analytics Overview</div>
        </div>
      </div>

      <div class="app-top-bar__right">
        <div class="top-bar-search top-bar-search--hidden d-none d-md-flex align-items-center" aria-hidden="true">
          <i class="bi bi-search me-2"></i>
          <span class="text-secondary">Search</span>
        </div>

        <button 
          type="button" 
          class="btn btn-icon" 
          title="{{themeToggleLabel()}}" 
          [attr.aria-label]="themeToggleLabel()"           
          (click)="themeService.toggleTheme()">
          <i class="bi" 
          [class.bi-moon]="isLight()" 
          [class.bi-sun]="!isLight()"></i>   
        </button>
        <button type="button" class="btn btn-icon" title="Notifications">
          <i class="bi bi-bell"></i>
        </button>

        <div class="user-chip d-flex align-items-center">
          <div class="user-chip__avatar">DK</div>
          <div class="d-none d-md-block">
            <div class="user-chip__name">David</div>
            <div class="user-chip__role">Admin</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
