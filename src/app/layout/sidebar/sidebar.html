<aside class="app-sidebar d-flex flex-column">
    <div class="app-sidebar__brand px-3 px-lg-4">
        <div class="d-flex align-items-center gap-4 text-warning">
            <div class="brand-mark d-inline-flex align-items-center justify-content-center">
                <i class="bi bi-grid-fill"></i>
            </div>
            <div>
                <div class="brand-title"> FinCore </div>
                <div class="brand-subtitle"> Product Dashboard </div>
            </div>
        </div>
    </div>
    <div class="px-3 px-lg-4 pb-3">
        <div class="sidebar-section-label mt-4">
            Navigation
        </div>
    </div>
    <nav class="flex-grow-1 px-1 px-lg-3">
        @for (item of navItems; track item.route) {
            <a
                class="sidebar-link d-flex align-items-center gap-3 text-decoration-none"
                [routerLink]="item.route"
                routerLinkActive="is-active"
                [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
                (click)="onNavigate()"
            >
                <i [class]="item.icon"></i>
                <span>{{ item.label }}</span>
                @if(item.badge) {
                    <span class="badge rounded-pill bg-primary">{{ item.badge }}</span>
                }
            </a>
        }
    </nav>
</aside>
